---
# ============================================================
#  Ansible inventory — BGP lab
#
#  Connection strategy: all playbooks use `connection: local`
#  and run `docker exec <container> vtysh` commands via shell.
#  This works because:
#    - The Ansible container has docker-cli installed
#    - /var/run/docker.sock is mounted into the container
#  No SSH, no special Ansible connection plugin needed.
# ============================================================
all:
  vars:
    ansible_connection: local

bgp_routers:
  hosts:
    bgp-r1:
      container: bgp-r1
      router_id: 1.1.1.1
      asn: 65001
    bgp-r2:
      container: bgp-r2
      router_id: 2.2.2.2
      asn: 65002
    bgp-r3:
      container: bgp-r3
      router_id: 3.3.3.3
      asn: 65003

route_reflectors:
  hosts:
    bgp-r4-rr:
      container: bgp-r4-rr
      router_id: 4.4.4.4
      asn: 65002
