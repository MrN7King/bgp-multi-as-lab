# ============================================================
#  BGP Multi-AS Lab v2  —  Full stack
#
#  Routers:
#    R1  AS65001  192.168.1.0/24   eBGP → R2
#    R2  AS65002  192.168.2.0/24   eBGP → R1, R3 | iBGP → R4-RR
#    R3  AS65003  192.168.3.0/24   eBGP → R2
#    R4  AS65002  (route reflector, same AS as R2, iBGP)
#
#  Monitoring:
#    Prometheus   172.30.0.20:9090
#    Grafana      172.30.0.21:3000
#
#  Alerting:
#    bgp-alerter  172.30.0.40  (Python poller → webhook)
#
#  Ansible (Windows-safe, runs inside Alpine Linux container):
#    docker compose run --rm ansible verify_bgp.yml
#    docker compose run --rm ansible push_config.yml
#    docker compose run --rm ansible harden_bgp.yml
#    docker compose run --rm ansible failover_test.yml
#
#  IP addressing (conflict-free):
#    172.17.0.0/16  Docker default bridge  ← avoided
#    172.20.0.0/24  observability-lab      ← avoided
#    172.99.0.0/24  observability-mgmt     ← avoided
#    10.0.12.0/29   R1-R2 link
#    10.0.23.0/29   R2-R3 link
#    10.0.24.0/29   R2-R4 iBGP link
#    172.30.0.0/24  BGP lab mgmt
# ============================================================

networks:
  link_r1_r2:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.12.0/29

  link_r2_r3:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.23.0/29

  link_r2_r4:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.24.0/29

  mgmt:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24

services:

  # ── R1  AS65001 ───────────────────────────────────────────
  r1:
    image: frrouting/frr:latest
    container_name: bgp-r1
    hostname: R1
    privileged: true
    networks:
      link_r1_r2:
        ipv4_address: 10.0.12.2
      mgmt:
        ipv4_address: 172.30.0.11
    volumes:
      - ./configs/r1:/etc/frr
    cap_add: [NET_ADMIN, SYS_ADMIN]
    sysctls:
      - net.ipv4.ip_forward=1

  # ── R2  AS65002  (eBGP transit + iBGP with R4-RR) ────────
  r2:
    image: frrouting/frr:latest
    container_name: bgp-r2
    hostname: R2
    privileged: true
    networks:
      link_r1_r2:
        ipv4_address: 10.0.12.3
      link_r2_r3:
        ipv4_address: 10.0.23.2
      link_r2_r4:
        ipv4_address: 10.0.24.2
      mgmt:
        ipv4_address: 172.30.0.12
    volumes:
      - ./configs/r2:/etc/frr
    cap_add: [NET_ADMIN, SYS_ADMIN]
    sysctls:
      - net.ipv4.ip_forward=1

  # ── R3  AS65003 ───────────────────────────────────────────
  r3:
    image: frrouting/frr:latest
    container_name: bgp-r3
    hostname: R3
    privileged: true
    networks:
      link_r2_r3:
        ipv4_address: 10.0.23.3
      mgmt:
        ipv4_address: 172.30.0.13
    volumes:
      - ./configs/r3:/etc/frr
    cap_add: [NET_ADMIN, SYS_ADMIN]
    sysctls:
      - net.ipv4.ip_forward=1

  # ── R4  AS65002  Route Reflector (iBGP) ──────────────────
  r4-rr:
    image: frrouting/frr:latest
    container_name: bgp-r4-rr
    hostname: R4-RR
    privileged: true
    networks:
      link_r2_r4:
        ipv4_address: 10.0.24.3
      mgmt:
        ipv4_address: 172.30.0.14
    volumes:
      - ./configs/r4-rr:/etc/frr
    cap_add: [NET_ADMIN, SYS_ADMIN]
    sysctls:
      - net.ipv4.ip_forward=1

  # ── Prometheus ────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: bgp-prometheus
    hostname: prometheus
    networks:
      mgmt:
        ipv4_address: 172.30.0.20
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
    ports:
      - "9090:9090"
    restart: unless-stopped

  # ── Grafana ───────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.3
    container_name: bgp-grafana
    hostname: grafana
    networks:
      mgmt:
        ipv4_address: 172.30.0.21
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=bgplab123
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

  # ── BGP Alerter (Python poller + Prometheus metrics) ──────
  bgp-alerter:
    image: python:3.12-slim
    container_name: bgp-alerter
    hostname: alerter
    networks:
      mgmt:
        ipv4_address: 172.30.0.40
    volumes:
      - ./alerting:/app
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /app
    command: >
      sh -c "pip install requests docker --quiet && python alerter.py"
    environment:
      - WEBHOOK_URL=${WEBHOOK_URL:-}
      - POLL_INTERVAL=30
      - ROUTER_IPS=172.30.0.11,172.30.0.12,172.30.0.13,172.30.0.14
    restart: unless-stopped
    depends_on:
      - r1
      - r2
      - r3
      - r4-rr

  # ── Ansible runner (Windows-safe, Linux inside Docker) ────
  #
  #  Does NOT start with `docker compose up -d` (profiles: tools)
  #  Run playbooks individually:
  #
  #    docker compose run --rm ansible verify_bgp.yml
  #    docker compose run --rm ansible push_config.yml
  #    docker compose run --rm ansible harden_bgp.yml
  #    docker compose run --rm ansible failover_test.yml
  #
  ansible:
    image: alpine:3.19
    container_name: bgp-ansible
    hostname: ansible
    profiles:
      - tools
    networks:
      mgmt:
        ipv4_address: 172.30.0.50
    volumes:
      - ./ansible:/ansible
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /ansible
    entrypoint: ["/ansible/run_playbook.sh"]
    environment:
      - ANSIBLE_HOST_KEY_CHECKING=False
      - ANSIBLE_STDOUT_CALLBACK=yaml
      - ANSIBLE_FORCE_COLOR=1
