! ============================================================
!  R2 — AS65002  (eBGP transit + iBGP client of R4-RR)
!  eBGP peers: R1 (AS65001) via 10.0.12.2
!              R3 (AS65003) via 10.0.23.3
!  iBGP peer:  R4-RR (AS65002) via 10.0.24.3
!  Advertises: 192.168.2.0/24
! ============================================================
frr version 8.5
frr defaults traditional
hostname R2
log syslog informational
service integrated-vtysh-config
!
interface lo
 ip address 192.168.2.1/24
!
interface eth0
 ip address 10.0.12.3/29
 description Link-to-R1
!
interface eth1
 ip address 10.0.23.2/29
 description Link-to-R3
!
interface eth2
 ip address 10.0.24.2/29
 description Link-to-R4-RR-iBGP
!
ip prefix-list PL_OUT_R2      seq 5  permit 192.168.2.0/24
ip prefix-list PL_OUT_R2      seq 10 deny   0.0.0.0/0 le 32
ip prefix-list PL_IN_FROM_R1  seq 5  permit 192.168.1.0/24
ip prefix-list PL_IN_FROM_R1  seq 99 deny   0.0.0.0/0 le 32
ip prefix-list PL_IN_FROM_R3  seq 5  permit 192.168.3.0/24
ip prefix-list PL_IN_FROM_R3  seq 99 deny   0.0.0.0/0 le 32
!
bgp community-list standard COM_CUSTOMER permit 65001:100
!
route-map RM_EXPORT_TO_R1 permit 10
 match ip address prefix-list PL_OUT_R2
 set community 65002:100
!
route-map RM_EXPORT_TO_R1 permit 20
 match ip address prefix-list PL_IN_FROM_R3
 set community 65002:200
!
route-map RM_IMPORT_FROM_R1 permit 10
 match ip address prefix-list PL_IN_FROM_R1
 set local-preference 150
!
route-map RM_EXPORT_TO_R3 permit 10
 match ip address prefix-list PL_OUT_R2
 set community 65002:100
!
route-map RM_EXPORT_TO_R3 permit 20
 match ip address prefix-list PL_IN_FROM_R1
 set community 65002:200
!
route-map RM_IMPORT_FROM_R3 permit 10
 match ip address prefix-list PL_IN_FROM_R3
 set local-preference 150
!
router bgp 65002
 bgp router-id 2.2.2.2
 bgp log-neighbor-changes
 no bgp ebgp-requires-policy
 !
 ! eBGP peers
 neighbor 10.0.12.2 remote-as 65001
 neighbor 10.0.12.2 description R1-AS65001
 neighbor 10.0.12.2 timers 5 15
 neighbor 10.0.12.2 soft-reconfiguration inbound
 neighbor 10.0.12.2 password bgplab_secret
 neighbor 10.0.12.2 ttl-security hops 1
 !
 neighbor 10.0.23.3 remote-as 65003
 neighbor 10.0.23.3 description R3-AS65003
 neighbor 10.0.23.3 timers 5 15
 neighbor 10.0.23.3 soft-reconfiguration inbound
 neighbor 10.0.23.3 password bgplab_secret
 neighbor 10.0.23.3 ttl-security hops 1
 !
 ! iBGP peer — R4 Route Reflector
 neighbor 10.0.24.3 remote-as 65002
 neighbor 10.0.24.3 description R4-RR-iBGP
 neighbor 10.0.24.3 timers 5 15
 neighbor 10.0.24.3 soft-reconfiguration inbound
 neighbor 10.0.24.3 next-hop-self
 !
 address-family ipv4 unicast
  network 192.168.2.0/24
  !
  neighbor 10.0.12.2 activate
  neighbor 10.0.12.2 route-map RM_EXPORT_TO_R1 out
  neighbor 10.0.12.2 route-map RM_IMPORT_FROM_R1 in
  neighbor 10.0.12.2 send-community both
  neighbor 10.0.12.2 maximum-prefix 10 80
  !
  neighbor 10.0.23.3 activate
  neighbor 10.0.23.3 route-map RM_EXPORT_TO_R3 out
  neighbor 10.0.23.3 route-map RM_IMPORT_FROM_R3 in
  neighbor 10.0.23.3 send-community both
  neighbor 10.0.23.3 maximum-prefix 10 80
  !
  neighbor 10.0.24.3 activate
  neighbor 10.0.24.3 send-community both
 exit-address-family
!
ip route 192.168.2.0/24 Null0
!
line vty
!
end
