! ============================================================
!  R4-RR — AS65002  ROUTE REFLECTOR
!
!  What a Route Reflector does:
!  Normal iBGP rule: a router cannot re-advertise a route
!  learned from one iBGP peer to another iBGP peer
!  (split-horizon). This prevents loops but means every
!  iBGP router must peer with every other (full mesh).
!
!  A Route Reflector breaks that rule for its "clients" —
!  it reflects routes between clients without needing a
!  full mesh. R4-RR acts as the reflection point inside
!  AS65002. R2 is its only client here.
!
!  iBGP peer (client): R2 (AS65002) via 10.0.24.2
!  Receives all external routes from R2 and reflects them.
! ============================================================
frr version 8.5
frr defaults traditional
hostname R4-RR
log syslog informational
service integrated-vtysh-config
!
interface lo
 ip address 192.168.4.1/24
!
interface eth0
 ip address 10.0.24.3/29
 description iBGP-Link-to-R2
!
router bgp 65002
 bgp router-id 4.4.4.4
 bgp log-neighbor-changes
 no bgp ebgp-requires-policy
 bgp cluster-id 4.4.4.4
 !
 ! R2 is an iBGP client — RR will reflect routes to/from it
 neighbor 10.0.24.2 remote-as 65002
 neighbor 10.0.24.2 description R2-iBGP-client
 neighbor 10.0.24.2 timers 5 15
 neighbor 10.0.24.2 soft-reconfiguration inbound
 neighbor 10.0.24.2 next-hop-self
 !
 address-family ipv4 unicast
  network 192.168.4.0/24
  neighbor 10.0.24.2 activate
  neighbor 10.0.24.2 route-reflector-client
  neighbor 10.0.24.2 send-community both
 exit-address-family
!
ip route 192.168.4.0/24 Null0
!
line vty
!
end
